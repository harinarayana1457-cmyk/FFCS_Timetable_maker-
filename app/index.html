<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTable Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </div>
                <span class="logo-text">TimeTable</span>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    Subjects
                </a>
                <a href="#" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Teachers
                </a>
                <a href="#" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                    Settings
                </a>
            </nav>

            <div class="quick-stats">
                <div class="stats-header">QUICK STATS</div>
                <div class="stat-row">
                    <span>Total Classes</span>
                    <span class="stat-val">24</span>
                </div>
                <div class="stat-row">
                    <span>Free Periods</span>
                    <span class="stat-val">6</span>
                </div>
                <!-- <div class="stat-row">
                    <span>Conflicts</span>
                    <span class="stat-val">0</span>
                </div> -->
            </div>

            <div class="slot-selector-card">
                <div class="card-header">
                    <div class="card-header" style="margin-bottom: 20px;">
                        <span
                            style="font-size: 1.5rem; background: linear-gradient(90deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SlotView</span>
                    </div>

                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="color: #A1A1AA; font-size: 0.85rem; margin-bottom: 5px; display: block;">Course
                            Title</label>
                        <input type="text" id="sidebar-course-title" placeholder="e.g. Java"
                            style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #2F2F2F; padding: 10px; border-radius: 8px; color: white;">
                    </div>

                    <div class="toggle-container">
                        <button class="toggle-btn active" id="btn-theory">Theory</button>
                        <button class="toggle-btn" id="btn-lab">Lab</button>
                    </div>

                    <!-- THEORY VIEW -->
                    <div id="theory-view" class="slots-scroll-area">
                        <div class="theory-split-layout">
                            <!-- Group 1 (Morning-ish) -->
                            <div class="slot-group">
                                <div class="slot-section-title">Morning / Group 1</div>
                                <div class="mini-grid">
                                    <button class="mini-btn" data-slot="A1">A1</button> <button class="mini-btn"
                                        data-slot="B1">B1</button>
                                    <button class="mini-btn" data-slot="C1">C1</button> <button class="mini-btn"
                                        data-slot="D1">D1</button>
                                    <button class="mini-btn" data-slot="E1">E1</button> <button class="mini-btn"
                                        data-slot="F1">F1</button>
                                    <button class="mini-btn" data-slot="G1">G1</button>

                                    <button class="mini-btn" data-slot="TA1">TA1</button> <button class="mini-btn"
                                        data-slot="TB1">TB1</button>
                                    <button class="mini-btn" data-slot="TC1">TC1</button> <button class="mini-btn"
                                        data-slot="TD1">TD1</button>
                                    <button class="mini-btn" data-slot="TE1">TE1</button> <button class="mini-btn"
                                        data-slot="TF1">TF1</button>
                                    <button class="mini-btn" data-slot="TG1">TG1</button>

                                    <button class="mini-btn" data-slot="TAA1" style="grid-column: span 2;">TAA1</button>
                                    <button class="mini-btn" data-slot="TCC1" style="grid-column: span 2;">TCC1</button>
                                </div>
                            </div>

                            <!-- Group 2 (Evening-ish) -->
                            <div class="slot-group">
                                <div class="slot-section-title">Evening / Group 2</div>
                                <div class="mini-grid">
                                    <button class="mini-btn" data-slot="A2">A2</button> <button class="mini-btn"
                                        data-slot="B2">B2</button>
                                    <button class="mini-btn" data-slot="C2">C2</button> <button class="mini-btn"
                                        data-slot="D2">D2</button>
                                    <button class="mini-btn" data-slot="E2">E2</button> <button class="mini-btn"
                                        data-slot="F2">F2</button>
                                    <button class="mini-btn" data-slot="G2">G2</button>

                                    <button class="mini-btn" data-slot="TA2">TA2</button> <button class="mini-btn"
                                        data-slot="TB2">TB2</button>
                                    <button class="mini-btn" data-slot="TC2">TC2</button> <button class="mini-btn"
                                        data-slot="TD2">TD2</button>
                                    <button class="mini-btn" data-slot="TE2">TE2</button> <button class="mini-btn"
                                        data-slot="TF2">TF2</button>
                                    <button class="mini-btn" data-slot="TG2">TG2</button>

                                    <button class="mini-btn" data-slot="TAA2" style="grid-column: span 2;">TAA2</button>
                                    <button class="mini-btn" data-slot="TBB2" style="grid-column: span 2;">TBB2</button>
                                    <button class="mini-btn" data-slot="TCC2" style="grid-column: span 2;">TCC2</button>
                                    <button class="mini-btn" data-slot="TDD2" style="grid-column: span 2;">TDD2</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- LAB VIEW (Hidden by default) -->
                    <div id="lab-view" class="slots-scroll-area hidden">
                        <div class="slot-section-title">Morning Labs</div>
                        <div class="mini-grid">
                            <button class="mini-btn" data-slot="L1">L1</button> <button class="mini-btn"
                                data-slot="L2">L2</button>
                            <button class="mini-btn" data-slot="L3">L3</button> <button class="mini-btn"
                                data-slot="L4">L4</button>
                            <button class="mini-btn" data-slot="L5">L5</button> <button class="mini-btn"
                                data-slot="L6">L6</button>
                            <button class="mini-btn" data-slot="L7">L7</button> <button class="mini-btn"
                                data-slot="L8">L8</button>
                            <button class="mini-btn" data-slot="L9">L9</button> <button class="mini-btn"
                                data-slot="L10">L10</button>
                            <button class="mini-btn" data-slot="L11">L11</button> <button class="mini-btn"
                                data-slot="L12">L12</button>
                            <button class="mini-btn" data-slot="L13">L13</button> <button class="mini-btn"
                                data-slot="L14">L14</button>
                            <button class="mini-btn" data-slot="L15">L15</button> <button class="mini-btn"
                                data-slot="L16">L16</button>
                            <button class="mini-btn" data-slot="L17">L17</button> <button class="mini-btn"
                                data-slot="L18">L18</button>
                            <button class="mini-btn" data-slot="L19">L19</button> <button class="mini-btn"
                                data-slot="L20">L20</button>
                            <button class="mini-btn" data-slot="L21">L21</button> <button class="mini-btn"
                                data-slot="L22">L22</button>
                            <button class="mini-btn" data-slot="L23">L23</button> <button class="mini-btn"
                                data-slot="L24">L24</button>
                            <button class="mini-btn" data-slot="L25">L25</button> <button class="mini-btn"
                                data-slot="L26">L26</button>
                            <button class="mini-btn" data-slot="L27">L27</button> <button class="mini-btn"
                                data-slot="L28">L28</button>
                            <button class="mini-btn" data-slot="L29">L29</button> <button class="mini-btn"
                                data-slot="L30">L30</button>
                            <button class="mini-btn" data-slot="L61">L61</button> <button class="mini-btn"
                                data-slot="L62">L62</button>
                            <button class="mini-btn" data-slot="L63">L63</button> <button class="mini-btn"
                                data-slot="L64">L64</button>
                            <button class="mini-btn" data-slot="L65">L65</button> <button class="mini-btn"
                                data-slot="L66">L66</button>
                        </div>

                        <div class="slot-section-title">Evening Labs</div>
                        <div class="mini-grid">
                            <button class="mini-btn" data-slot="L31">L31</button> <button class="mini-btn"
                                data-slot="L32">L32</button>
                            <button class="mini-btn" data-slot="L33">L33</button> <button class="mini-btn"
                                data-slot="L34">L34</button>
                            <button class="mini-btn" data-slot="L35">L35</button> <button class="mini-btn"
                                data-slot="L36">L36</button>
                            <button class="mini-btn" data-slot="L37">L37</button> <button class="mini-btn"
                                data-slot="L38">L38</button>
                            <button class="mini-btn" data-slot="L39">L39</button> <button class="mini-btn"
                                data-slot="L40">L40</button>
                            <button class="mini-btn" data-slot="L41">L41</button> <button class="mini-btn"
                                data-slot="L42">L42</button>
                            <button class="mini-btn" data-slot="L43">L43</button> <button class="mini-btn"
                                data-slot="L44">L44</button>
                            <button class="mini-btn" data-slot="L45">L45</button> <button class="mini-btn"
                                data-slot="L46">L46</button>
                            <button class="mini-btn" data-slot="L47">L47</button> <button class="mini-btn"
                                data-slot="L48">L48</button>
                            <button class="mini-btn" data-slot="L49">L49</button> <button class="mini-btn"
                                data-slot="L50">L50</button>
                            <button class="mini-btn" data-slot="L51">L51</button> <button class="mini-btn"
                                data-slot="L52">L52</button>
                            <button class="mini-btn" data-slot="L53">L53</button> <button class="mini-btn"
                                data-slot="L54">L54</button>
                            <button class="mini-btn" data-slot="L55">L55</button> <button class="mini-btn"
                                data-slot="L56">L56</button>
                            <button class="mini-btn" data-slot="L57">L57</button> <button class="mini-btn"
                                data-slot="L58">L58</button>
                            <button class="mini-btn" data-slot="L59">L59</button> <button class="mini-btn"
                                data-slot="L60">L60</button>
                            <button class="mini-btn" data-slot="L67">L67</button> <button class="mini-btn"
                                data-slot="L68">L68</button>
                            <button class="mini-btn" data-slot="L69">L69</button> <button class="mini-btn"
                                data-slot="L70">L70</button>
                            <button class="mini-btn" data-slot="L71">L71</button> <button class="mini-btn"
                                data-slot="L72">L72</button>
                        </div>
                    </div>
                </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="breadcrumbs">
                    <span class="crumb-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg></span>
                    <span class="divider">/</span>
                </div>
                <!-- <div class="header-actions">
                    <button class="btn-text">Log in</button>
                    <button class="btn-primary">Get Started</button>
                </div> -->
            </header>

            <div class="content-body">
                <div class="hero-section" style="text-align: center; margin-bottom: 20px;">
                    <h2>Freshers Winter Semester 2025-26</h2>
                </div>

                <div class="week-stats">
                    <div class="stat-block">
                        <span class="big-num">7</span>
                        <span class="label">CLASSES</span>
                    </div>
                    <div class="stat-block">
                        <span class="big-num">7</span>
                        <span class="label">HOURS/WEEK</span>
                    </div>
                    <!-- <div class="week-toggle">
                        <button class="toggle-pill active">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            This Week
                        </button>
                    </div> -->
                </div>

                <div class="timetable-grid-container">


                    <div id="grid-body" class="grid-body">
                        <!-- Rows generated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Edit Slot Details (<span id="modal-slot-id"></span>)</h3>
            <input type="hidden" id="edit-slot-id">
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" id="subject-name" placeholder="e.g. Mathematics">
            </div>
            <div class="form-group">
                <label>Teacher Name</label>
                <input type="text" id="teacher-name" placeholder="e.g. Prof. Smith">
            </div>
            <div class="modal-actions">
                <button id="cancel-edit" class="btn-text">Cancel</button>
                <button id="save-edit" class="btn-primary">Save</button>
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
